  <script>
    (function() {
      const stored = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = stored || (prefersDark ? 'dark' : 'light');
      document.documentElement.classList.remove('light', 'dark');
      document.documentElement.classList.add(theme);
    })();
  </script>

  <script>
  (function () {
    'use strict';
    function initTheme() {
      const toggle = () => {
        const root = document.documentElement;
        const isDark = root.classList.contains('dark');
        root.classList.remove('light', 'dark');
        root.classList.add(isDark ? 'light' : 'dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
      };
      document.getElementById('theme-toggle')?.addEventListener('click', toggle);
      document.getElementById('theme-toggle-mobile')?.addEventListener('click', toggle);
    }
    function initMobileMenu() {
      const btn = document.getElementById('mobile-menu-btn');
      const menu = document.getElementById('mobile-menu');
      const iconMenu = document.getElementById('icon-menu');
      const iconClose = document.getElementById('icon-close');
      if (!btn || !menu) return;
      btn.addEventListener('click', () => {
        const isOpen = !menu.classList.contains('hidden');
        menu.classList.toggle('hidden', isOpen);
        if (iconMenu) iconMenu.classList.toggle('hidden', !isOpen);
        if (iconClose) iconClose.classList.toggle('hidden', isOpen);
      });
      menu.querySelectorAll('.mobile-link').forEach((link) => {
        link.addEventListener('click', () => {
          menu.classList.add('hidden');
          if (iconMenu) iconMenu.classList.remove('hidden');
          if (iconClose) iconClose.classList.add('hidden');
        });
      });
    }
    function initHeroSlider() {
      const slides = document.querySelectorAll('.hero-slide');
      const dots = document.querySelectorAll('.hero-dot');
      if (!slides.length) return;
      let activeIndex = 0;
      const total = slides.length;
      function goTo(index) { activeIndex = (index + total) % total; slides.forEach((s, i) => { s.classList.toggle('opacity-100', i === activeIndex); s.classList.toggle('opacity-0', i !== activeIndex); }); dots.forEach((d, i) => { const isActive = i === activeIndex; d.classList.toggle('w-5', isActive); d.classList.toggle('w-2', !isActive); d.classList.toggle('bg-blue-400', isActive); d.classList.toggle('bg-white/60', !isActive); }); }
      dots.forEach((dot) => dot.addEventListener('click', () => goTo(parseInt(dot.dataset.index, 10))));
      setInterval(() => goTo(activeIndex + 1), 6000);
    }
    function initShowcaseSlider() { const slides = document.querySelectorAll('.showcase-slide'); const dots = document.querySelectorAll('.showcase-dot'); if (!slides.length) return; }
    function initFaq() { document.querySelectorAll('.faq-item').forEach((item) => { const btn = item.querySelector('.faq-btn'); const content = item.querySelector('.faq-content'); const icon = item.querySelector('.faq-icon'); if (!btn || !content) return; btn.addEventListener('click', () => { const isOpen = !content.classList.contains('hidden'); document.querySelectorAll('.faq-content').forEach((c) => c.classList.add('hidden')); document.querySelectorAll('.faq-icon').forEach((i) => i.classList.remove('rotate-180')); if (!isOpen) { content.classList.remove('hidden'); if (icon) icon.classList.add('rotate-180'); } }); }); }
    function initToggles() { const onColors = { default: ['bg-indigo-600'], success: ['bg-emerald-600'], warning: ['bg-amber-500'] }; const offColors = ['bg-slate-200', 'dark:bg-slate-700']; document.querySelectorAll('.toggle-btn').forEach((btn) => { btn.addEventListener('click', () => { const on = btn.getAttribute('aria-pressed') === 'true'; const onLeft = btn.dataset.onLeft || 'left-7'; const variant = btn.classList.contains('toggle-success') ? 'success' : btn.classList.contains('toggle-warning') ? 'warning' : 'default'; const colors = onColors[variant]; btn.setAttribute('aria-pressed', String(!on)); colors.forEach((c) => btn.classList.toggle(c, !on)); offColors.forEach((c) => btn.classList.toggle(c, on)); const knob = btn.querySelector('span'); if (knob) { knob.classList.toggle('left-1', on); knob.classList.toggle(onLeft, !on); } }); }); }
    function initYear() { const el = document.getElementById('year'); if (el) el.textContent = new Date().getFullYear(); }
    function initPasswordToggle() { const input = document.getElementById('pwd-input'); const toggle = document.getElementById('pwd-toggle'); const eye = document.getElementById('pwd-eye'); const eyeOff = document.getElementById('pwd-eye-off'); if (!input || !toggle) return; toggle.addEventListener('click', () => { const isPwd = input.type === 'password'; input.type = isPwd ? 'text' : 'password'; if (eye) eye.classList.toggle('hidden', isPwd); if (eyeOff) eyeOff.classList.toggle('hidden', !isPwd); }); }
    function initRangeSlider() { const range = document.getElementById('range-input'); const valEl = document.getElementById('range-val'); if (range && valEl) range.addEventListener('input', () => { valEl.textContent = range.value; }); }
    function initRating() { document.querySelectorAll('#rating-demo .rating-star').forEach((star) => { star.addEventListener('click', () => { const val = parseInt(star.dataset.value, 10); star.parentElement.querySelectorAll('.rating-star').forEach((s, i) => { s.classList.toggle('text-amber-400', i < val); s.classList.toggle('text-slate-300', i >= val); s.classList.toggle('dark:text-slate-600', i >= val); }); }); }); }
    function initOtpInput() { document.querySelectorAll('.otp-input').forEach((input, i, arr) => { input.addEventListener('input', (e) => { if (e.target.value.length === 1 && i < arr.length - 1) arr[i + 1].focus(); }); input.addEventListener('keydown', (e) => { if (e.key === 'Backspace' && !e.target.value && i > 0) arr[i - 1].focus(); }); }); }
    function initModal() { const trigger = document.getElementById('modal-trigger'); const backdrop = document.getElementById('modal-backdrop'); const modal = document.getElementById('modal'); const close = document.getElementById('modal-close'); const open = () => { backdrop?.classList.remove('hidden'); modal?.classList.remove('hidden'); }; const hide = () => { backdrop?.classList.add('hidden'); modal?.classList.add('hidden'); }; trigger?.addEventListener('click', open); close?.addEventListener('click', hide); backdrop?.addEventListener('click', (e) => { if (e.target === backdrop) hide(); }); }
    function initFormValidation() { /* unchanged */ }
    function initMultiSelect() { /* unchanged */ }
    function renderCalendarDays(year, month, selectedDate, onSelect, daysEl) { /* unchanged */ }
    function initCalendar() { /* unchanged */ }
    function initDatePicker(inputId, dropdownId, titleId, daysId, prevId, nextId) { /* unchanged */ }
    function initDropdowns() { /* unchanged */ }
    function initToast() { /* unchanged */ }
    function initTagInput() { /* unchanged */ }
    function initRemovableTags() { /* unchanged */ }
    function initPagination() { /* unchanged */ }
    function initStepper() { /* unchanged */ }
    function initCopy() { /* unchanged */ }
    function initTabs() { /* unchanged */ }
    initTheme(); initMobileMenu(); initHeroSlider(); initFaq(); initToggles(); initYear(); initPasswordToggle(); initRangeSlider(); initRating(); initOtpInput(); initModal(); initCalendar(); initDatePicker('date-picker-input','date-picker-dropdown','dp-title','dp-days','dp-prev','dp-next'); initDatePicker('date-picker-start','date-picker-start-dropdown','dp-start-title','dp-start-days','dp-start-prev','dp-start-next'); initDatePicker('date-picker-end','date-picker-end-dropdown','dp-end-title','dp-end-days','dp-end-prev','dp-end-next'); initTagInput(); initDropdowns(); initToast(); initRemovableTags(); initPagination(); initStepper(); initCopy(); initTabs();
  })();
  </script>
